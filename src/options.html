<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TubeReply</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>TubeReply</h1>
      <p class="hint" data-i18n="privacyHint">Ключи хранятся только в локальном хранилище Chrome на этом компьютере.</p>

      <form id="settings">
        <label>
          <span data-i18n="uiLanguage">Язык интерфейса</span>
          <select id="uiLanguage">
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
        </label>

        <label>
          <span data-i18n="provider">Провайдер</span>
          <select id="provider">
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
            <option value="anthropic">Anthropic Claude</option>
            <option value="groq">Groq</option>
            <option value="openrouter">OpenRouter</option>
          </select>
        </label>

        <div class="provider-card" data-provider-card="openai">
          <label>
            OpenAI API key
            <input id="openaiApiKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label>
            OpenAI model
            <select id="openaiModel" data-model-select="openai"></select>
          </label>
          <label class="custom-model" data-custom-model="openai" hidden>
            Custom OpenAI model
            <input id="openaiCustomModel" type="text" placeholder="gpt-5.4-mini">
          </label>
        </div>

        <div class="provider-card" data-provider-card="gemini">
          <label>
            Gemini API key
            <input id="geminiApiKey" type="password" autocomplete="off" placeholder="AIza...">
          </label>
          <label>
            Gemini model
            <select id="geminiModel" data-model-select="gemini"></select>
          </label>
          <label class="custom-model" data-custom-model="gemini" hidden>
            Custom Gemini model
            <input id="geminiCustomModel" type="text" placeholder="gemini-2.5-flash">
          </label>
        </div>

        <div class="provider-card" data-provider-card="anthropic">
          <label>
            Anthropic API key
            <input id="anthropicApiKey" type="password" autocomplete="off" placeholder="sk-ant-...">
          </label>
          <label>
            Anthropic model
            <select id="anthropicModel" data-model-select="anthropic"></select>
          </label>
          <label class="custom-model" data-custom-model="anthropic" hidden>
            Custom Anthropic model
            <input id="anthropicCustomModel" type="text" placeholder="claude-sonnet-4-20250514">
          </label>
        </div>

        <div class="provider-card" data-provider-card="groq">
          <label>
            Groq API key
            <input id="groqApiKey" type="password" autocomplete="off" placeholder="gsk_...">
          </label>
          <label>
            Groq model
            <select id="groqModel" data-model-select="groq"></select>
          </label>
          <label class="custom-model" data-custom-model="groq" hidden>
            Custom Groq model
            <input id="groqCustomModel" type="text" placeholder="llama-3.1-8b-instant">
          </label>
        </div>

        <div class="provider-card" data-provider-card="openrouter">
          <label>
            OpenRouter API key
            <input id="openrouterApiKey" type="password" autocomplete="off" placeholder="sk-or-...">
          </label>
          <label>
            OpenRouter model
            <select id="openrouterModel" data-model-select="openrouter"></select>
          </label>
          <label class="custom-model" data-custom-model="openrouter" hidden>
            Custom OpenRouter model
            <input id="openrouterCustomModel" type="text" placeholder="google/gemini-2.5-flash-lite">
          </label>
        </div>

        <label>
          <span data-i18n="replyLanguage">Язык ответа</span>
          <select id="replyLanguage"></select>
        </label>

        <label>
          <span data-i18n="previewLanguage">Язык превью</span>
          <select id="previewLanguage"></select>
        </label>

        <label>
          <span data-i18n="maxWords">Максимум слов</span>
          <input id="maxWords" type="number" min="5" max="120" step="1">
        </label>

        <label class="full-row">
          <span data-i18n="brandVoice">Тон канала</span>
          <textarea id="brandVoice" rows="3"></textarea>
        </label>

        <button type="submit" data-i18n="save">Сохранить</button>
        <span id="status" role="status"></span>
      </form>

    </main>
    <script src="options.js"></script>
  </body>
</html>
